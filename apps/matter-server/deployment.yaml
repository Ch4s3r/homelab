apiVersion: apps/v1
kind: Deployment
metadata:
  name: matter-server
  namespace: matter-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: matter-server
  template:
    metadata:
      labels:
        app: matter-server
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: matter-server
        # renovate: datasource=docker depName=ghcr.io/home-assistant-libs/python-matter-server versioning=loose
        image: ghcr.io/home-assistant-libs/python-matter-server:stable
        imagePullPolicy: Always
        securityContext:
          privileged: true
        args:
        - --storage-path
        - /data
        - --paa-trust-store-path
        - /data/credentials
        env:
        - name: TZ
          value: "Europe/Vienna"
        ports:
        - containerPort: 5580
          name: ws
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: matter-server-data-pvc
