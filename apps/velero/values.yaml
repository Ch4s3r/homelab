initContainers:
  - name: velero-plugin-for-aws
    # renovate: datasource=docker depName=velero/velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.2@sha256:0751144c1c8e52d52c48717fbd13ad5a3061e612ae4d7ad744a946cd5b139d1a
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

credentials:
  useSecret: true
  existingSecret: garage-s3-credentials

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: backups
      prefix: velero
      default: true
      validationFrequency: "1h"
      config:
        region: garage
        s3ForcePathStyle: "true"
        s3Url: http://10.0.0.11:3900
        publicUrl: http://10.0.0.11:3900
  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: garage

deployNodeAgent: true

snapshotsEnabled: false

schedules:
  daily:
    schedule: "0 18 * * *"
    template:
      ttl: "168h"
      defaultVolumesToFsBackup: true
      includedNamespaces:
        - "*"
      excludedNamespaces:
        - velero
        - media
      excludedResources:
        - secrets
  weekly:
    schedule: "0 18 * * 0"
    template:
      ttl: "720h"
      defaultVolumesToFsBackup: true
      includedNamespaces:
        - "*"
      excludedNamespaces:
        - velero
        - media
      excludedResources:
        - secrets
  monthly:
    schedule: "0 18 1 * *"
    template:
      ttl: "8760h"
      defaultVolumesToFsBackup: true
      includedNamespaces:
        - "*"
      excludedNamespaces:
        - velero
        - media
      excludedResources:
        - secrets
