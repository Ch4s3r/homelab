apiVersion: batch/v1
kind: Job
metadata:
  name: media-bootstrap
  namespace: media
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: media-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: wire
          # renovate: datasource=docker depName=curlimages/curl versioning=docker
          image: curlimages/curl:8.11.0
          env:
            - name: PLEX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: media-secret
                  key: PLEX_TOKEN
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-secret
                  key: SONARR_API_KEY
            - name: RADARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-secret
                  key: RADARR_API_KEY
            - name: PROWLARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-secret
                  key: PROWLARR_API_KEY
            - name: BAZARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-secret
                  key: BAZARR_API_KEY
            - name: QBITTORRENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: media-secret
                  key: QBITTORRENT_PASSWORD
          command: ["sh", "-c"]
          args:
            - |
              set -eu

              wait_for() {
                url=$1
                for i in $(seq 1 180); do
                  if curl -sfk "$url" >/dev/null 2>&1; then
                    echo "ready: $url"
                    return 0
                  fi
                  sleep 2
                done
                echo "timeout waiting for $url" >&2
                return 1
              }

              echo "=== media directories ==="
              mkdir -p /media/movies /media/tv /media/downloads
              echo "media directories ready"

              echo "=== waiting for services ==="
              wait_for "http://plex-plex-media-server:32400/identity"
              wait_for "http://sonarr:8989/ping"
              wait_for "http://radarr:7878/ping"
              wait_for "http://prowlarr:9696/ping"
              wait_for "http://qbittorrent:8080"
              wait_for "http://bazarr:6767"
              wait_for "http://overseerr:5055/api/v1/status"

              echo "=== plex libraries ==="
              LIBRARIES=$(curl -sf "http://plex-plex-media-server:32400/library/sections?X-Plex-Token=$PLEX_TOKEN" || echo "")
              if ! echo "$LIBRARIES" | grep -q 'title="Movies"'; then
                curl -sfX POST \
                  "http://plex-plex-media-server:32400/library/sections?name=Movies&type=movie&agent=tv.plex.agents.movie&scanner=Plex%20Movie&language=en-US&location=/media/movies&X-Plex-Token=$PLEX_TOKEN" \
                  >/dev/null && echo "Movies library created" || echo "Movies library create failed"
              else
                echo "Movies library present"
              fi
              if ! echo "$LIBRARIES" | grep -q 'title="TV Shows"'; then
                curl -sfX POST \
                  "http://plex-plex-media-server:32400/library/sections?name=TV%20Shows&type=show&agent=tv.plex.agents.series&scanner=Plex%20TV%20Series&language=en-US&location=/media/tv&X-Plex-Token=$PLEX_TOKEN" \
                  >/dev/null && echo "TV Shows library created" || echo "TV Shows library create failed"
              else
                echo "TV Shows library present"
              fi

              echo "=== prowlarr: sonarr + radarr apps ==="
              PROWLARR_APPS=$(curl -sf -H "X-Api-Key: $PROWLARR_API_KEY" \
                http://prowlarr:9696/api/v1/applications || echo "[]")

              if ! echo "$PROWLARR_APPS" | grep -q '"Radarr"'; then
                curl -sf -X POST \
                  -H "X-Api-Key: $PROWLARR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"Radarr\",\"syncLevel\":\"fullSync\",\"enable\":true,\"priority\":25,\"appProfileId\":1,\"implementationName\":\"Radarr\",\"implementation\":\"Radarr\",\"configContract\":\"RadarrSettings\",\"tags\":[],\"fields\":[{\"name\":\"prowlarrUrl\",\"value\":\"http://prowlarr:9696\"},{\"name\":\"baseUrl\",\"value\":\"http://radarr:7878\"},{\"name\":\"apiKey\",\"value\":\"$RADARR_API_KEY\"},{\"name\":\"syncCategories\",\"value\":[2000,2010,2020,2030,2040,2045,2050,2060,2070,2080,2090]},{\"name\":\"syncRejectBlocklistedTorrentHashesWhileGrabbing\",\"value\":false}]}" \
                  http://prowlarr:9696/api/v1/applications >/dev/null \
                  && echo "prowlarr: radarr added" || echo "prowlarr: radarr add failed"
              else
                echo "prowlarr: radarr already present"
              fi

              if ! echo "$PROWLARR_APPS" | grep -q '"Sonarr"'; then
                curl -sf -X POST \
                  -H "X-Api-Key: $PROWLARR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"Sonarr\",\"syncLevel\":\"fullSync\",\"enable\":true,\"priority\":25,\"appProfileId\":1,\"implementationName\":\"Sonarr\",\"implementation\":\"Sonarr\",\"configContract\":\"SonarrSettings\",\"tags\":[],\"fields\":[{\"name\":\"prowlarrUrl\",\"value\":\"http://prowlarr:9696\"},{\"name\":\"baseUrl\",\"value\":\"http://sonarr:8989\"},{\"name\":\"apiKey\",\"value\":\"$SONARR_API_KEY\"},{\"name\":\"syncCategories\",\"value\":[5000,5010,5020,5030,5040,5045,5050,5060,5070,5080,5090]},{\"name\":\"animeSyncCategories\",\"value\":[5070]},{\"name\":\"syncAnimeStandardFormatSearch\",\"value\":false},{\"name\":\"syncRejectBlocklistedTorrentHashesWhileGrabbing\",\"value\":false}]}" \
                  http://prowlarr:9696/api/v1/applications >/dev/null \
                  && echo "prowlarr: sonarr added" || echo "prowlarr: sonarr add failed"
              else
                echo "prowlarr: sonarr already present"
              fi

              echo "=== prowlarr: indexers ==="
              PROWLARR_INDEXERS=$(curl -sf -H "X-Api-Key: $PROWLARR_API_KEY" \
                http://prowlarr:9696/api/v1/indexer || echo "[]")

              if ! echo "$PROWLARR_INDEXERS" | grep -q '"YTS"'; then
                curl -sf -X POST \
                  -H "X-Api-Key: $PROWLARR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"YTS\",\"enable\":true,\"priority\":25,\"appProfileId\":1,\"implementation\":\"Cardigann\",\"implementationName\":\"Cardigann\",\"configContract\":\"CardigannSettings\",\"privacy\":\"public\",\"tags\":[],\"fields\":[{\"name\":\"definitionFile\",\"value\":\"yts\"},{\"name\":\"baseUrl\",\"value\":\"https://yts.mx/\"}]}" \
                  http://prowlarr:9696/api/v1/indexer >/dev/null \
                  && echo "prowlarr: YTS added" || echo "prowlarr: YTS add failed"
              else
                echo "prowlarr: YTS already present"
              fi

              if ! echo "$PROWLARR_INDEXERS" | grep -q '"The Pirate Bay"'; then
                curl -sf -X POST \
                  -H "X-Api-Key: $PROWLARR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"The Pirate Bay\",\"enable\":true,\"priority\":25,\"appProfileId\":1,\"implementation\":\"Cardigann\",\"implementationName\":\"Cardigann\",\"configContract\":\"CardigannSettings\",\"privacy\":\"public\",\"tags\":[],\"fields\":[{\"name\":\"definitionFile\",\"value\":\"thepiratebay\"},{\"name\":\"baseUrl\",\"value\":\"https://thepiratebay.org/\"}]}" \
                  http://prowlarr:9696/api/v1/indexer >/dev/null \
                  && echo "prowlarr: The Pirate Bay added" || echo "prowlarr: The Pirate Bay add failed"
              else
                echo "prowlarr: The Pirate Bay already present"
              fi

              echo "=== sonarr: root folder + download client ==="
              SONARR_ROOTS=$(curl -sf -H "X-Api-Key: $SONARR_API_KEY" \
                http://sonarr:8989/api/v3/rootfolder || echo "[]")
              if ! echo "$SONARR_ROOTS" | grep -q '"/media/tv"'; then
                curl -sf -X POST \
                  -H "X-Api-Key: $SONARR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d '{"path":"/media/tv"}' \
                  http://sonarr:8989/api/v3/rootfolder >/dev/null \
                  && echo "sonarr: root folder /media/tv added" || echo "sonarr: root folder add failed"
              else
                echo "sonarr: root folder already present"
              fi

              SONARR_CLIENTS=$(curl -sf -H "X-Api-Key: $SONARR_API_KEY" \
                http://sonarr:8989/api/v3/downloadclient || echo "[]")
              if ! echo "$SONARR_CLIENTS" | grep -q '"qBittorrent"'; then
                curl -sf -X POST \
                  -H "X-Api-Key: $SONARR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"qBittorrent\",\"enable\":true,\"protocol\":\"torrent\",\"priority\":1,\"implementation\":\"QBittorrent\",\"configContract\":\"QBittorrentSettings\",\"fields\":[{\"name\":\"host\",\"value\":\"qbittorrent\"},{\"name\":\"port\",\"value\":8080},{\"name\":\"username\",\"value\":\"admin\"},{\"name\":\"password\",\"value\":\"$QBITTORRENT_PASSWORD\"},{\"name\":\"category\",\"value\":\"tv\"},{\"name\":\"useSsl\",\"value\":false}]}" \
                  http://sonarr:8989/api/v3/downloadclient >/dev/null \
                  && echo "sonarr: qbittorrent download client added" || echo "sonarr: download client add failed"
              else
                echo "sonarr: download client already present"
              fi

              echo "=== radarr: root folder + download client ==="
              RADARR_ROOTS=$(curl -sf -H "X-Api-Key: $RADARR_API_KEY" \
                http://radarr:7878/api/v3/rootfolder || echo "[]")
              if ! echo "$RADARR_ROOTS" | grep -q '"/media/movies"'; then
                curl -sf -X POST \
                  -H "X-Api-Key: $RADARR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d '{"path":"/media/movies"}' \
                  http://radarr:7878/api/v3/rootfolder >/dev/null \
                  && echo "radarr: root folder /media/movies added" || echo "radarr: root folder add failed"
              else
                echo "radarr: root folder already present"
              fi

              RADARR_CLIENTS=$(curl -sf -H "X-Api-Key: $RADARR_API_KEY" \
                http://radarr:7878/api/v3/downloadclient || echo "[]")
              if ! echo "$RADARR_CLIENTS" | grep -q '"qBittorrent"'; then
                curl -sf -X POST \
                  -H "X-Api-Key: $RADARR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"qBittorrent\",\"enable\":true,\"protocol\":\"torrent\",\"priority\":1,\"implementation\":\"QBittorrent\",\"configContract\":\"QBittorrentSettings\",\"fields\":[{\"name\":\"host\",\"value\":\"qbittorrent\"},{\"name\":\"port\",\"value\":8080},{\"name\":\"username\",\"value\":\"admin\"},{\"name\":\"password\",\"value\":\"$QBITTORRENT_PASSWORD\"},{\"name\":\"category\",\"value\":\"movies\"},{\"name\":\"useSsl\",\"value\":false}]}" \
                  http://radarr:7878/api/v3/downloadclient >/dev/null \
                  && echo "radarr: qbittorrent download client added" || echo "radarr: download client add failed"
              else
                echo "radarr: download client already present"
              fi

              echo "=== bazarr: sonarr + radarr integration ==="
              BAZARR_SETTINGS=$(curl -sf -H "X-Api-Key: $BAZARR_API_KEY" \
                http://bazarr:6767/api/sonarr || echo "{}")

              if ! echo "$BAZARR_SETTINGS" | grep -q '"sonarr"'; then
                curl -sf -X POST \
                  -H "X-Api-Key: $BAZARR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"ip\":\"sonarr\",\"port\":8989,\"apikey\":\"$SONARR_API_KEY\",\"ssl\":false,\"base_url\":\"/\"}" \
                  http://bazarr:6767/api/sonarr >/dev/null \
                  && echo "bazarr: sonarr configured" || echo "bazarr: sonarr config failed"

                curl -sf -X POST \
                  -H "X-Api-Key: $BAZARR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"ip\":\"radarr\",\"port\":7878,\"apikey\":\"$RADARR_API_KEY\",\"ssl\":false,\"base_url\":\"/\"}" \
                  http://bazarr:6767/api/radarr >/dev/null \
                  && echo "bazarr: radarr configured" || echo "bazarr: radarr config failed"
              else
                echo "bazarr: already configured"
              fi

              echo "=== qbittorrent: preferences ==="
              QB_LOGGED_IN=$(curl -sf -X POST \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "username=admin&password=$QBITTORRENT_PASSWORD" \
                -c /tmp/qb_cookies.txt \
                http://qbittorrent:8080/api/v2/auth/login || echo "")

              if [ "$QB_LOGGED_IN" != "Ok." ]; then
                echo "qbittorrent: setting initial password + save path (auth bypass active)"
                curl -sf \
                  -H "Referer: http://qbittorrent:8080" \
                  -X POST \
                  -d "json={\"web_ui_username\":\"admin\",\"web_ui_password\":\"$QBITTORRENT_PASSWORD\",\"save_path\":\"/media/downloads\"}" \
                  http://qbittorrent:8080/api/v2/app/setPreferences >/dev/null \
                  && echo "qbittorrent: password + save path set" || echo "qbittorrent: preferences set failed"
              else
                QB_PREFS=$(curl -sf -b /tmp/qb_cookies.txt \
                  http://qbittorrent:8080/api/v2/app/preferences || echo "{}")
                if ! echo "$QB_PREFS" | grep -q '"/media/downloads"'; then
                  curl -sf -b /tmp/qb_cookies.txt \
                    -H "Referer: http://qbittorrent:8080" \
                    -X POST \
                    -d 'json={"save_path":"/media/downloads"}' \
                    http://qbittorrent:8080/api/v2/app/setPreferences >/dev/null \
                    && echo "qbittorrent: save path set to /media/downloads" || echo "qbittorrent: save path set failed"
                else
                  echo "qbittorrent: save path already correct"
                fi
              fi

              echo "=== overseerr setup ==="
              COOKIE=/tmp/cookies.txt
              rm -f "$COOKIE"
              curl -sf -c "$COOKIE" -X POST \
                -H 'Content-Type: application/json' \
                -d "{\"authToken\":\"$PLEX_TOKEN\"}" \
                "http://overseerr:5055/api/v1/auth/plex" >/dev/null
              echo "overseerr: authenticated with plex"

              PLEX_CFG=$(curl -sf -b "$COOKIE" http://overseerr:5055/api/v1/settings/plex || echo "")
              PLEX_MACHINE_ID=$(echo "$PLEX_CFG" | grep -o '"machineId":"[^"]*"' | cut -d'"' -f4)

              if [ -z "$PLEX_MACHINE_ID" ]; then
                PLEX_LOCAL_IP=""
                for i in $(seq 1 30); do
                  SERVERS=$(curl -sf -b "$COOKIE" \
                    "http://overseerr:5055/api/v1/settings/plex/devices/servers" || echo "[]")
                  PLEX_LOCAL_IP=$(echo "$SERVERS" | grep -o '"address":"[^"]*","port":32400' | \
                    grep -o '"address":"[^"]*"' | cut -d'"' -f4 | head -1)
                  if [ -n "$PLEX_LOCAL_IP" ]; then
                    break
                  fi
                  sleep 2
                done

                if [ -n "$PLEX_LOCAL_IP" ]; then
                  RESULT=$(curl -sf -b "$COOKIE" -X POST \
                    -H 'Content-Type: application/json' \
                    -d "{\"ip\":\"$PLEX_LOCAL_IP\",\"port\":32400,\"useSsl\":false,\"hostname\":\"plex-plex-media-server\"}" \
                    "http://overseerr:5055/api/v1/settings/plex" || echo "")
                  if echo "$RESULT" | grep -q '"machineId"'; then
                    echo "overseerr: plex server registered"
                    curl -sf -b "$COOKIE" \
                      "http://overseerr:5055/api/v1/settings/plex/library?sync=true&enable=1,2" \
                      >/dev/null || true
                    echo "overseerr: plex libraries enabled"
                  else
                    echo "overseerr: plex registration failed: $RESULT"
                  fi
                else
                  echo "overseerr: no local plex address found"
                fi
              else
                echo "overseerr: plex already configured ($PLEX_MACHINE_ID)"
              fi

              RADARR_PROFILE_ID=$(curl -sf -H "X-Api-Key: $RADARR_API_KEY" \
                http://radarr:7878/api/v3/qualityprofile | \
                grep -o '"id":[0-9]*,"name":"[^"]*"' | head -1 | grep -o '"id":[0-9]*' | cut -d: -f2)
              RADARR_PROFILE_ID=${RADARR_PROFILE_ID:-1}
              RADARR_PROFILE_NAME=$(curl -sf -H "X-Api-Key: $RADARR_API_KEY" \
                http://radarr:7878/api/v3/qualityprofile/$RADARR_PROFILE_ID | \
                grep -o '"name":"[^"]*"' | head -1 | cut -d'"' -f4)
              RADARR_PROFILE_NAME=${RADARR_PROFILE_NAME:-Any}

              SONARR_PROFILE_ID=$(curl -sf -H "X-Api-Key: $SONARR_API_KEY" \
                http://sonarr:8989/api/v3/qualityprofile | \
                grep -o '"id":[0-9]*,"name":"[^"]*"' | head -1 | grep -o '"id":[0-9]*' | cut -d: -f2)
              SONARR_PROFILE_ID=${SONARR_PROFILE_ID:-1}
              SONARR_PROFILE_NAME=$(curl -sf -H "X-Api-Key: $SONARR_API_KEY" \
                http://sonarr:8989/api/v3/qualityprofile/$SONARR_PROFILE_ID | \
                grep -o '"name":"[^"]*"' | head -1 | cut -d'"' -f4)
              SONARR_PROFILE_NAME=${SONARR_PROFILE_NAME:-Any}

              RADARR_COUNT=$(curl -sf -b "$COOKIE" http://overseerr:5055/api/v1/settings/radarr | \
                grep -c '"id"' || echo "0")
              if [ "$RADARR_COUNT" -eq 0 ]; then
                curl -sf -b "$COOKIE" -X POST \
                  -H 'Content-Type: application/json' \
                  -d "{\"name\":\"Radarr\",\"hostname\":\"radarr\",\"port\":7878,\"apiKey\":\"$RADARR_API_KEY\",\"useSsl\":false,\"baseUrl\":\"\",\"activeProfileId\":$RADARR_PROFILE_ID,\"activeProfileName\":\"$RADARR_PROFILE_NAME\",\"activeDirectory\":\"/media/movies\",\"is4k\":false,\"minimumAvailability\":\"released\",\"isDefault\":true,\"externalUrl\":\"https://radarr.bumblebee-themis.ts.net\",\"syncEnabled\":true,\"preventSearch\":false}" \
                  "http://overseerr:5055/api/v1/settings/radarr" >/dev/null \
                  && echo "overseerr: radarr added" || echo "overseerr: radarr add failed"
              else
                echo "overseerr: radarr already configured"
              fi

              SONARR_COUNT=$(curl -sf -b "$COOKIE" http://overseerr:5055/api/v1/settings/sonarr | \
                grep -c '"id"' || echo "0")
              if [ "$SONARR_COUNT" -eq 0 ]; then
                curl -sf -b "$COOKIE" -X POST \
                  -H 'Content-Type: application/json' \
                  -d "{\"name\":\"Sonarr\",\"hostname\":\"sonarr\",\"port\":8989,\"apiKey\":\"$SONARR_API_KEY\",\"useSsl\":false,\"baseUrl\":\"\",\"activeProfileId\":$SONARR_PROFILE_ID,\"activeProfileName\":\"$SONARR_PROFILE_NAME\",\"activeDirectory\":\"/media/tv\",\"activeLanguageProfileId\":1,\"is4k\":false,\"isDefault\":true,\"externalUrl\":\"https://sonarr.bumblebee-themis.ts.net\",\"syncEnabled\":true,\"preventSearch\":false,\"enableSeasonFolders\":true}" \
                  "http://overseerr:5055/api/v1/settings/sonarr" >/dev/null \
                  && echo "overseerr: sonarr added" || echo "overseerr: sonarr add failed"
              else
                echo "overseerr: sonarr already configured"
              fi

              echo "=== bootstrap done ==="
          volumeMounts:
            - name: media
              mountPath: /media
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media
