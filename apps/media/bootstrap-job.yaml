apiVersion: batch/v1
kind: Job
metadata:
  name: media-bootstrap
  namespace: media
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: media-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: wire
          # renovate: datasource=docker depName=curlimages/curl versioning=docker
          image: curlimages/curl:8.11.0
          env:
            - name: PLEX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: media-secret
                  key: PLEX_TOKEN
            - name: SONARR_API_KEY
              value: b66d3fe27c2a2b48d3a1d1ae0c03f818
            - name: RADARR_API_KEY
              value: 5d2912b9cd3cf89dba3312c93b289772
          command: ["sh", "-c"]
          args:
            - |
              set -eu

              wait_for() {
                url=$1
                for i in $(seq 1 180); do
                  if curl -sfk "$url" >/dev/null 2>&1; then
                    echo "ready: $url"
                    return 0
                  fi
                  sleep 2
                done
                echo "timeout waiting for $url" >&2
                return 1
              }

              echo "=== waiting for services ==="
              wait_for "http://plex-plex-media-server:32400/identity"
              wait_for "http://overseerr:5055/api/v1/status"
              wait_for "http://sonarr:8989/ping"
              wait_for "http://radarr:7878/ping"

              echo "=== plex libraries ==="
              LIBRARIES=$(curl -sf "http://plex-plex-media-server:32400/library/sections?X-Plex-Token=$PLEX_TOKEN" || echo "")
              if ! echo "$LIBRARIES" | grep -q 'title="Movies"'; then
                echo "creating Movies library"
                curl -sfX POST \
                  "http://plex-plex-media-server:32400/library/sections?name=Movies&type=movie&agent=tv.plex.agents.movie&scanner=Plex%20Movie&language=en-US&location=/media/movies&X-Plex-Token=$PLEX_TOKEN" \
                  || echo "Movies create failed (may already exist)"
              else
                echo "Movies library present"
              fi
              if ! echo "$LIBRARIES" | grep -q 'title="TV Shows"'; then
                echo "creating TV Shows library"
                curl -sfX POST \
                  "http://plex-plex-media-server:32400/library/sections?name=TV%20Shows&type=show&agent=tv.plex.agents.series&scanner=Plex%20TV%20Series&language=en-US&location=/media/tv&X-Plex-Token=$PLEX_TOKEN" \
                  || echo "TV Shows create failed (may already exist)"
              else
                echo "TV Shows library present"
              fi

              echo "=== overseerr setup ==="
              COOKIE=/tmp/cookies.txt
              rm -f "$COOKIE"
              curl -sf -c "$COOKIE" -X POST \
                -H 'Content-Type: application/json' \
                -d "{\"authToken\":\"$PLEX_TOKEN\"}" \
                "http://overseerr:5055/api/v1/auth/plex" >/dev/null
              echo "authenticated with plex"

              PLEX_CFG=$(curl -sf -b "$COOKIE" http://overseerr:5055/api/v1/settings/plex || echo "")
              PLEX_MACHINE_ID=$(echo "$PLEX_CFG" | grep -o '"machineId":"[^"]*"' | cut -d'"' -f4)

              if [ -z "$PLEX_MACHINE_ID" ]; then
                echo "configuring plex server"

                # Retry device discovery up to 60s to wait for Plex to register with plex.tv
                PLEX_LOCAL_IP=""
                for i in $(seq 1 30); do
                  SERVERS=$(curl -sf -b "$COOKIE" \
                    "http://overseerr:5055/api/v1/settings/plex/devices/servers" || echo "[]")
                  # Prefer local port-32400 connection over external Tailscale HTTPS
                  PLEX_LOCAL_IP=$(echo "$SERVERS" | grep -o '"address":"[^"]*","port":32400' | \
                    grep -o '"address":"[^"]*"' | cut -d'"' -f4 | head -1)
                  if [ -n "$PLEX_LOCAL_IP" ]; then
                    break
                  fi
                  sleep 2
                done

                if [ -n "$PLEX_LOCAL_IP" ]; then
                  echo "using plex address: $PLEX_LOCAL_IP"
                  RESULT=$(curl -sf -b "$COOKIE" -X POST \
                    -H 'Content-Type: application/json' \
                    -d "{\"ip\":\"$PLEX_LOCAL_IP\",\"port\":32400,\"useSsl\":false,\"hostname\":\"plex-plex-media-server\"}" \
                    "http://overseerr:5055/api/v1/settings/plex" || echo "")
                  if echo "$RESULT" | grep -q '"machineId"'; then
                    echo "plex server registered"
                    curl -sf -b "$COOKIE" \
                      "http://overseerr:5055/api/v1/settings/plex/library?sync=true&enable=1,2" \
                      >/dev/null || echo "library sync warning"
                    echo "plex libraries synced"
                  else
                    echo "plex server registration failed"
                  fi
                else
                  echo "plex device discovery returned no local address, skipping"
                fi
              else
                echo "plex already configured: $PLEX_MACHINE_ID"
              fi

              # Add Radarr only if not already present
              RADARR_COUNT=$(curl -sf -b "$COOKIE" http://overseerr:5055/api/v1/settings/radarr | \
                grep -c '"id"' || echo "0")
              if [ "$RADARR_COUNT" -eq 0 ]; then
                curl -sf -b "$COOKIE" -X POST \
                  -H 'Content-Type: application/json' \
                  -d "{\"name\":\"Radarr\",\"hostname\":\"radarr\",\"port\":7878,\"apiKey\":\"$RADARR_API_KEY\",\"useSsl\":false,\"baseUrl\":\"\",\"activeProfileId\":1,\"activeProfileName\":\"HD - 1080p\",\"activeDirectory\":\"/media/movies\",\"is4k\":false,\"minimumAvailability\":\"released\",\"isDefault\":true,\"externalUrl\":\"https://radarr.bumblebee-themis.ts.net\",\"syncEnabled\":true,\"preventSearch\":false}" \
                  "http://overseerr:5055/api/v1/settings/radarr" || echo "radarr post failed"
                echo "radarr registered"
              else
                echo "radarr already configured ($RADARR_COUNT)"
              fi

              # Add Sonarr only if not already present
              SONARR_COUNT=$(curl -sf -b "$COOKIE" http://overseerr:5055/api/v1/settings/sonarr | \
                grep -c '"id"' || echo "0")
              if [ "$SONARR_COUNT" -eq 0 ]; then
                curl -sf -b "$COOKIE" -X POST \
                  -H 'Content-Type: application/json' \
                  -d "{\"name\":\"Sonarr\",\"hostname\":\"sonarr\",\"port\":8989,\"apiKey\":\"$SONARR_API_KEY\",\"useSsl\":false,\"baseUrl\":\"\",\"activeProfileId\":1,\"activeProfileName\":\"HD - 1080p\",\"activeDirectory\":\"/media/tv\",\"activeLanguageProfileId\":1,\"is4k\":false,\"isDefault\":true,\"externalUrl\":\"https://sonarr.bumblebee-themis.ts.net\",\"syncEnabled\":true,\"preventSearch\":false,\"enableSeasonFolders\":true}" \
                  "http://overseerr:5055/api/v1/settings/sonarr" || echo "sonarr post failed"
                echo "sonarr registered"
              else
                echo "sonarr already configured ($SONARR_COUNT)"
              fi

              echo "=== bootstrap done ==="
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
