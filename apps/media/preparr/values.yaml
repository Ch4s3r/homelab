global:
  namespace: media
  createNamespace: false

preparr:
  image:
    repository: ghcr.io/robbeverhelst/preparr
    # renovate: datasource=docker depName=ghcr.io/robbeverhelst/preparr versioning=semver
    tag: 0.19.5
    pullPolicy: IfNotPresent
  logLevel: info

postgresql:
  enabled: false
  externalHost: preparr-postgres-rw
  auth:
    username: postgres
    password: ""
    database: servarr
    existingSecret: preparr-postgres-superuser
    secretKeys:
      adminPasswordKey: password
  service:
    type: ClusterIP
    port: 5432
  logDatabaseEnabled: true

qbittorrent:
  enabled: true
  image:
    repository: linuxserver/qbittorrent
    # renovate: datasource=docker depName=linuxserver/qbittorrent versioning=docker
    tag: 5.1.4
    pullPolicy: IfNotPresent
  auth:
    username: admin
    password: 7ad0e54bde5c46ecdb4b0efb
  service:
    type: ClusterIP
    webui:
      port: 8080
    bittorrent:
      port: 6881
  downloadsPath: /media/downloads
  env:
    TZ: Europe/Vienna
    PUID: "1000"
    PGID: "1000"
  configStorage:
    enabled: true
    size: 2Gi
    storageClass: local-path
  extraVolumes:
    - name: media
      persistentVolumeClaim:
        claimName: media
  extraVolumeMounts:
    - name: media
      mountPath: /media

prowlarr:
  enabled: true
  image:
    repository: linuxserver/prowlarr
    # renovate: datasource=docker depName=linuxserver/prowlarr versioning=docker
    tag: 2.3.5
    pullPolicy: IfNotPresent
  apiKey: b26b62a046ed606384d38d1ac9b883de
  adminPassword: 8417f46881d65e1c2ddd67fa
  service:
    type: ClusterIP
    webui:
      port: 9696
    health:
      port: 9001
  env:
    TZ: Europe/Vienna
    PUID: "1000"
    PGID: "1000"
  reconciliation:
    enabled: true
    interval: 30
    watch: true
  config:
    apiKey: b26b62a046ed606384d38d1ac9b883de
    applications:
      - name: Sonarr
        apiKey: b66d3fe27c2a2b48d3a1d1ae0c03f818
        baseUrl: http://sonarr:8989
        prowlarrUrl: http://prowlarr:9696
        syncLevel: fullSync
      - name: Radarr
        apiKey: 5d2912b9cd3cf89dba3312c93b289772
        baseUrl: http://radarr:7878
        prowlarrUrl: http://prowlarr:9696
        syncLevel: fullSync
    indexers:
      - name: YTS
        enable: true
        priority: 25
      - name: The Pirate Bay
        enable: true
        priority: 25

sonarr:
  enabled: true
  image:
    repository: linuxserver/sonarr
    # renovate: datasource=docker depName=linuxserver/sonarr versioning=docker
    tag: 4.0.17
    pullPolicy: IfNotPresent
  apiKey: b66d3fe27c2a2b48d3a1d1ae0c03f818
  adminPassword: 0687489294312e7be5ebb1ab
  service:
    type: ClusterIP
    webui:
      port: 8989
    health:
      port: 9001
  env:
    TZ: Europe/Vienna
    PUID: "1000"
    PGID: "1000"
  storage:
    tv:
      enabled: false
  extraVolumes:
    - name: media
      persistentVolumeClaim:
        claimName: media
  extraVolumeMounts:
    - name: media
      mountPath: /media
  reconciliation:
    enabled: true
    interval: 30
    watch: true
  config:
    apiKey: b66d3fe27c2a2b48d3a1d1ae0c03f818
    prowlarrSync: true
    rootFolders:
      - path: /media/tv
        accessible: true
    qualityProfiles:
      - name: "HD - 1080p"
        upgradeAllowed: true
        cutoff: 1080
        items:
          - quality:
              id: 1
              name: HDTV-1080p
            allowed: true
          - quality:
              id: 2
              name: WEBDL-1080p
            allowed: true
    downloadClients:
      - name: qBittorrent
        implementation: QBittorrent
        implementationName: qBittorrent
        configContract: QBittorrentSettings
        fields:
          - name: host
            value: qbittorrent
          - name: port
            value: 8080
          - name: username
            value: admin
          - name: password
            value: 7ad0e54bde5c46ecdb4b0efb
          - name: category
            value: tv
        enable: true
        priority: 1

radarr:
  enabled: true
  image:
    repository: linuxserver/radarr
    # renovate: datasource=docker depName=linuxserver/radarr versioning=docker
    tag: 6.1.1
    pullPolicy: IfNotPresent
  apiKey: 5d2912b9cd3cf89dba3312c93b289772
  adminPassword: 1489c5d5fdf7883d127741b5
  service:
    type: ClusterIP
    webui:
      port: 7878
    health:
      port: 9001
  env:
    TZ: Europe/Vienna
    PUID: "1000"
    PGID: "1000"
  storage:
    movies:
      enabled: false
  extraVolumes:
    - name: media
      persistentVolumeClaim:
        claimName: media
  extraVolumeMounts:
    - name: media
      mountPath: /media
  reconciliation:
    enabled: true
    interval: 30
    watch: true
  config:
    apiKey: 5d2912b9cd3cf89dba3312c93b289772
    prowlarrSync: true
    rootFolders:
      - path: /media/movies
        accessible: true
    qualityProfiles:
      - name: "HD - 1080p"
        upgradeAllowed: true
        cutoff: 1080
        items:
          - quality:
              id: 1
              name: Bluray-1080p
            allowed: true
          - quality:
              id: 2
              name: WEBDL-1080p
            allowed: true
    downloadClients:
      - name: qBittorrent
        implementation: QBittorrent
        implementationName: qBittorrent
        configContract: QBittorrentSettings
        fields:
          - name: host
            value: qbittorrent
          - name: port
            value: 8080
          - name: username
            value: admin
          - name: password
            value: 7ad0e54bde5c46ecdb4b0efb
          - name: category
            value: movies
        enable: true
        priority: 1

bazarr:
  enabled: true
  image:
    repository: linuxserver/bazarr
    # renovate: datasource=docker depName=linuxserver/bazarr versioning=docker
    tag: 1.5.6
    pullPolicy: IfNotPresent
  apiKey: a719ad0446a418da922ab40e74365c44
  service:
    type: ClusterIP
    webui:
      port: 6767
  env:
    TZ: Europe/Vienna
    PUID: "1000"
    PGID: "1000"
  extraVolumes:
    - name: media
      persistentVolumeClaim:
        claimName: media
  extraVolumeMounts:
    - name: media
      mountPath: /media
  reconciliation:
    watch: true
    interval: 60
  config:
    apiKey: a719ad0446a418da922ab40e74365c44
    bazarr:
      languages:
        - code: en
          name: English
      providers:
        - name: opensubtitles
          enabled: true
      sonarr:
        url: http://sonarr:8989
        apiKey: b66d3fe27c2a2b48d3a1d1ae0c03f818
      radarr:
        url: http://radarr:7878
        apiKey: 5d2912b9cd3cf89dba3312c93b289772
