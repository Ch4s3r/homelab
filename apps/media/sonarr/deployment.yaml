apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            - sh
            - -c
            - until nc -z preparr-postgres-rw 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: sonarr
          # renovate: datasource=docker depName=linuxserver/sonarr versioning=docker
          image: linuxserver/sonarr:4.0.19@sha256:fbb15bb4fb14d1ffe017f6be0e3fed8f1b300e4687e329767da0b61f36ba1eed
          livenessProbe:
            tcpSocket:
              port: 8989
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          env:
            - name: TZ
              value: Europe/Vienna
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: SONARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: media-secret
                  key: SONARR_API_KEY
            - name: SONARR__POSTGRES__HOST
              value: preparr-postgres-rw
            - name: SONARR__POSTGRES__PORT
              value: "5432"
            - name: SONARR__POSTGRES__USER
              value: postgres
            - name: SONARR__POSTGRES__PASSWORD
              value: ""
            - name: SONARR__POSTGRES__MAINDB
              value: sonarr_main
            - name: SONARR__POSTGRES__LOGDB
              value: sonarr_log
          ports:
            - containerPort: 8989
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: media
          persistentVolumeClaim:
            claimName: media
