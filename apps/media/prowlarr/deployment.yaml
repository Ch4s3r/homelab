apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.38@sha256:b6762ddf4a50aabb5f4d21aa6f447d05d5633fb09f09c08b33f22356a2f98be0
          command:
            - sh
            - -c
            - until nc -z preparr-postgres-rw 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: prowlarr
          # renovate: datasource=docker depName=linuxserver/prowlarr versioning=docker
          image: linuxserver/prowlarr:2.3.5
          livenessProbe:
            tcpSocket:
              port: 9696
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          env:
            - name: TZ
              value: Europe/Vienna
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: PROWLARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: media-secret
                  key: PROWLARR_API_KEY
            - name: PROWLARR__POSTGRES__HOST
              value: preparr-postgres-rw
            - name: PROWLARR__POSTGRES__PORT
              value: "5432"
            - name: PROWLARR__POSTGRES__USER
              value: postgres
            - name: PROWLARR__POSTGRES__PASSWORD
              value: ""
            - name: PROWLARR__POSTGRES__MAINDB
              value: prowlarr_main
            - name: PROWLARR__POSTGRES__LOGDB
              value: prowlarr_log
          ports:
            - containerPort: 9696
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config
