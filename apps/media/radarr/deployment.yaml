apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.38@sha256:b6762ddf4a50aabb5f4d21aa6f447d05d5633fb09f09c08b33f22356a2f98be0
          command:
            - sh
            - -c
            - until nc -z preparr-postgres-rw 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: radarr
          # renovate: datasource=docker depName=linuxserver/radarr versioning=docker
          image: linuxserver/radarr:6.1.1
          livenessProbe:
            tcpSocket:
              port: 7878
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          env:
            - name: TZ
              value: Europe/Vienna
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: RADARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: media-secret
                  key: RADARR_API_KEY
            - name: RADARR__POSTGRES__HOST
              value: preparr-postgres-rw
            - name: RADARR__POSTGRES__PORT
              value: "5432"
            - name: RADARR__POSTGRES__USER
              value: postgres
            - name: RADARR__POSTGRES__PASSWORD
              value: ""
            - name: RADARR__POSTGRES__MAINDB
              value: radarr_main
            - name: RADARR__POSTGRES__LOGDB
              value: radarr_log
          ports:
            - containerPort: 7878
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: media
          persistentVolumeClaim:
            claimName: media
