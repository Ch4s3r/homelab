apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-bucket-bootstrap-script
  namespace: garage-bootstrap
data:
  bootstrap.sh: |
    #!/bin/sh
    set -eu
    BUCKET="$1"
    API="http://10.0.0.11:3903"
    AUTH="Authorization: Bearer ${ADMIN_TOKEN}"

    echo "Looking up bucket ${BUCKET}..."
    HTTP=$(curl -s -o /tmp/lookup -w '%{http_code}' \
      -H "${AUTH}" "${API}/v1/bucket?globalAlias=${BUCKET}")

    if [ "${HTTP}" = "200" ]; then
      BUCKET_ID=$(sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /tmp/lookup | head -1)
      echo "Bucket exists, id=${BUCKET_ID}. Skipping create."
    else
      echo "Bucket not found (${HTTP}), creating..."
      HTTP=$(curl -s -o /tmp/create -w '%{http_code}' -X POST \
        -H "${AUTH}" -H "Content-Type: application/json" \
        "${API}/v1/bucket" \
        -d "{\"globalAlias\":\"${BUCKET}\"}")
      if [ "${HTTP}" != "200" ]; then
        echo "Create failed (${HTTP}):"; cat /tmp/create; exit 1
      fi
      BUCKET_ID=$(sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /tmp/create | head -1)
      echo "Created bucket id=${BUCKET_ID}"
    fi

    [ -n "${BUCKET_ID}" ] || { echo "no bucket id"; exit 1; }

    echo "Ensuring key ${VELERO_KEY_ID} has read+write..."
    HTTP=$(curl -s -o /tmp/allow -w '%{http_code}' -X POST \
      -H "${AUTH}" -H "Content-Type: application/json" \
      "${API}/v1/bucket/allow" \
      -d "{\"bucketId\":\"${BUCKET_ID}\",\"accessKeyId\":\"${VELERO_KEY_ID}\",\"permissions\":{\"read\":true,\"write\":true,\"owner\":false}}")
    if [ "${HTTP}" != "200" ]; then
      echo "Allow failed (${HTTP}):"; cat /tmp/allow; exit 1
    fi
    echo "Done."
