apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-bucket-bootstrap-script
  namespace: garage-bootstrap
data:
  bootstrap.sh: |
    #!/bin/sh
    set -eu
    BUCKET="$1"
    API="http://10.0.0.11:3903"
    AUTH="Authorization: Bearer ${ADMIN_TOKEN}"

    echo "Ensuring bucket ${BUCKET}..."
    HTTP=$(curl -s -o /tmp/resp -w '%{http_code}' -X POST "${API}/v1/bucket" \
      -H "${AUTH}" -H "Content-Type: application/json" \
      -d "{\"globalAlias\":\"${BUCKET}\"}")
    if [ "${HTTP}" != "200" ] && [ "${HTTP}" != "409" ]; then
      echo "Bucket create failed (${HTTP}):"; cat /tmp/resp; exit 1
    fi

    echo "Resolving bucket id..."
    curl -fsS "${API}/v1/bucket?globalAlias=${BUCKET}" -H "${AUTH}" > /tmp/bkt
    BUCKET_ID=$(sed -n 's/.*"id":"\([^"]*\)".*/\1/p' /tmp/bkt | head -1)
    [ -n "${BUCKET_ID}" ] || { echo "no bucket id"; cat /tmp/bkt; exit 1; }
    echo "Bucket id: ${BUCKET_ID}"

    echo "Granting key ${VELERO_KEY_ID} read+write..."
    HTTP=$(curl -s -o /tmp/resp -w '%{http_code}' -X POST "${API}/v1/bucket/allow" \
      -H "${AUTH}" -H "Content-Type: application/json" \
      -d "{\"bucketId\":\"${BUCKET_ID}\",\"accessKeyId\":\"${VELERO_KEY_ID}\",\"permissions\":{\"read\":true,\"write\":true,\"owner\":false}}")
    if [ "${HTTP}" != "200" ]; then
      echo "Grant failed (${HTTP}):"; cat /tmp/resp; exit 1
    fi
    echo "Done."
