apiVersion: batch/v1
kind: Job
metadata:
  name: garage-bucket-backups
  namespace: garage-bootstrap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          # renovate: datasource=docker depName=curlimages/curl
          image: curlimages/curl:8.20.0@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
          command: ["sh", "/scripts/bootstrap.sh", "backups"]
          envFrom:
            - secretRef:
                name: garage-admin
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: garage-bucket-bootstrap-script
            defaultMode: 0755
