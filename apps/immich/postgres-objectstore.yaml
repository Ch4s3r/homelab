apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: immich-database-store
  namespace: immich
spec:
  retentionPolicy: "30d"
  configuration:
    destinationPath: s3://backups/cnpg/
    endpointURL: http://10.0.0.11:3900
    s3Credentials:
      accessKeyId:
        name: immich-postgres-backup-s3
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: immich-postgres-backup-s3
        key: SECRET_ACCESS_KEY
      region:
        name: immich-postgres-backup-s3
        key: REGION
    wal:
      compression: gzip
    data:
      compression: gzip
