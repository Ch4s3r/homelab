newrelic-infrastructure:
  enabled: true

nri-prometheus:
  enabled: false

nri-metadata-injection:
  enabled: true

kube-state-metrics:
  enabled: true
  image:
    tag: v2.13.0

nri-kube-events:
  enabled: true

newrelic-logging:
  # disabled: Fluent Bit 4.2.2 (base of newrelic-fluentbit-output:3.4.0) uses jemalloc
  # which does not support Asahi Linux's 16KB memory pages (+16k kernel variant)
  enabled: false

newrelic-pixie:
  enabled: false

pixie-chart:
  enabled: false

newrelic-infra-operator:
  enabled: false

newrelic-prometheus-agent:
  enabled: true
  lowDataMode: true
  config:
    kubernetes:
      integrations_filter:
        enabled: false

nr-ebpf-agent:
  # incompatible with Asahi Linux: uses BCC (requires kernel headers at runtime),
  # kernel-devel is not packaged for the +16k page variant, and BTF/CO-RE fallback is not supported
  enabled: false

k8s-agents-operator:
  enabled: true

newrelic-k8s-metrics-adapter:
  enabled: false

global:
  cluster: "MacMini K3s"
  region: EU
  licenseKey: ""
  customSecretName: "newrelic-secret"
  customSecretLicenseKey: "licenseKey"
  lowDataMode: true
  privileged: true

integrations_config:
  configMapName: nri-integration-cfg-example
